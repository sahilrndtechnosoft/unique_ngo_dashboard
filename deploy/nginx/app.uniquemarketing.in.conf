# Unique NGO Dashboard — app.uniquemarketing.in
# Path: /etc/nginx/conf.d/app.uniquemarketing.in.conf
#
# Fix: ^~ on /api/ and /uploads/ — do NOT use a global regex for *.jpeg
# (it steals /uploads/logo/*.jpeg and looks in frontend/dist → 404).

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name app.uniquemarketing.in;

    ssl_certificate /etc/letsencrypt/live/app.uniquemarketing.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.uniquemarketing.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/rndprojects/unique_ngo_dashboard/frontend/dist;
    index index.html;

    client_max_body_size 20M;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # API + Swagger (/api/v1, /api/docs)
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3017;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }

    # Uploads — serve from disk (logo, favicon, banners, products, etc.)
    location ^~ /uploads/ {
        alias /var/www/rndprojects/unique_ngo_dashboard/backend/uploads/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Vite static assets (flags, images, fonts)
    location ^~ /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/app.uniquemarketing.in.access.log;
    error_log  /var/log/nginx/app.uniquemarketing.in.error.log;
}

server {
    listen 80;
    listen [::]:80;
    server_name app.uniquemarketing.in;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
