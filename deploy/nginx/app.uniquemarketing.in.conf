# Unique NGO Dashboard — app.uniquemarketing.in
# Install: sudo cp this file to /etc/nginx/conf.d/app.uniquemarketing.in.conf
# Then:    sudo nginx -t && sudo systemctl reload nginx
#
# Ports:
#   Public  → 80 / 443 (nginx)
#   API     → 127.0.0.1:3017 (PM2 NestJS)

server {
    listen 80;
    listen [::]:80;
    server_name app.uniquemarketing.in;

    # After certbot, this server block is often redirected to HTTPS.
    # Keep ACME challenge path for Let's Encrypt renewals.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    root /var/www/rndprojects/UNIQUE_NGO_DASHBOARD/frontend/dist;
    index index.html;

    client_max_body_size 20M;

    # NestJS API (global prefix /api/v1) + Swagger at /api/docs
    location /api/ {
        proxy_pass http://127.0.0.1:3017;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }

    # Uploaded files served by Nest (prefix /uploads)
    location /uploads/ {
        proxy_pass http://127.0.0.1:3017;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SPA (Vite React build)
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|map)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    access_log /var/log/nginx/app.uniquemarketing.in.access.log;
    error_log  /var/log/nginx/app.uniquemarketing.in.error.log;
}

# After: sudo certbot --nginx -d app.uniquemarketing.in
# certbot will add a listen 443 ssl server block automatically.
